apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: pix-gateway-service
  description: "Gateway de entrada para transações PIX, responsável por roteamento e segurança"
  annotations:
    github.com/project-slug: emanueldeveloper82/pix-gateway-service
    # Habilita a aba de documentação técnica
    backstage.io/techdocs-ref: dir:.
spec:
  type: service
  lifecycle: production
  # Vinculado ao grupo 'pix' definido no seu central-catalog
  owner: group:pix
  # Vinculado ao domínio financeiro
  domain: financeiro
  # Agrupador lógico para os serviços de PIX
  system: system:pix-ecosystem
